name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true
      NPM_CONFIG_TAG: latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check whether this branch can release
        id: release_policy
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Unsupported release branch: ${GITHUB_REF_NAME}."
            echo "Releases can only run from main."
            exit 1
          fi

          echo "release_enabled=true" >> "$GITHUB_OUTPUT"

      - name: Capture current release tags
        if: steps.release_policy.outputs.release_enabled == 'true'
        run: git tag --list '@better-translate/*@*' | sort > "$RUNNER_TEMP/release-tags-before.txt"

      - name: Create release pull request or publish packages
        if: steps.release_policy.outputs.release_enabled == 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run ci:version
          publish: bun run ci:release
          title: "chore: release packages"
          commit: "chore: release packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release tags from package versions
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.changesets.outputs.published == 'true'
        run: bun run release:tags

      - name: Push newly created release tags
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.changesets.outputs.published == 'true'
        env:
          GIT_REMOTE: origin
        run: node ./scripts/push-release-tags.mjs --before-file "$RUNNER_TEMP/release-tags-before.txt" --require-new-tags

      - name: Create GitHub Releases for new package tags
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:github --before-file "$RUNNER_TEMP/release-tags-before.txt"
