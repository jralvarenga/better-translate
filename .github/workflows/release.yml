name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true
      NPM_CONFIG_TAG: latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check whether this branch can release
        id: release_policy
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Unsupported release branch: ${GITHUB_REF_NAME}."
            echo "Releases can only run from main."
            exit 1
          fi

          echo "release_enabled=true" >> "$GITHUB_OUTPUT"

      - name: Capture current release tags
        if: steps.release_policy.outputs.release_enabled == 'true'
        run: git tag --list '@better-translate/*@*' | sort > "$RUNNER_TEMP/release-tags-before.txt"

      - name: Configure deploy key for git pushes
        if: steps.release_policy.outputs.release_enabled == 'true'
        env:
          RELEASE_DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          if [ -z "${RELEASE_DEPLOY_KEY}" ]; then
            echo "Missing required secret: RELEASE_DEPLOY_KEY"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${RELEASE_DEPLOY_KEY}" > ~/.ssh/release_deploy_key
          chmod 600 ~/.ssh/release_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host github.com
            IdentityFile ~/.ssh/release_deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"

      - name: Verify deploy key authentication
        if: steps.release_policy.outputs.release_enabled == 'true'
        run: |
          ssh-keygen -y -f ~/.ssh/release_deploy_key > /dev/null
          ssh -o BatchMode=yes -T git@github.com || status=$?
          if [ "${status:-0}" -ne 1 ]; then
            echo "Deploy key authentication failed."
            exit "${status:-1}"
          fi

      - name: Detect pending changesets
        if: steps.release_policy.outputs.release_enabled == 'true'
        id: pending_changesets
        run: |
          if find .changeset -maxdepth 1 -name '*.md' -print -quit | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply changeset version bumps
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.pending_changesets.outputs.has_changesets == 'true'
        run: bun run ci:version

      - name: Commit version updates
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.pending_changesets.outputs.has_changesets == 'true'
        id: version_commit
        run: |
          if git diff --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release packages"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Push version updates to main
        if: steps.release_policy.outputs.release_enabled == 'true' && steps.version_commit.outputs.created == 'true'
        run: git push origin HEAD:${GITHUB_REF_NAME}

      - name: Publish packages from current main state
        if: steps.release_policy.outputs.release_enabled == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run ci:release

      - name: Create release tags from package versions
        if: steps.release_policy.outputs.release_enabled == 'true'
        run: bun run release:tags

      - name: Push newly created release tags
        if: steps.release_policy.outputs.release_enabled == 'true'
        env:
          GIT_REMOTE: origin
        run: node ./scripts/push-release-tags.mjs --before-file "$RUNNER_TEMP/release-tags-before.txt"

      - name: Create GitHub Releases for new package tags
        if: steps.release_policy.outputs.release_enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:github --before-file "$RUNNER_TEMP/release-tags-before.txt"
