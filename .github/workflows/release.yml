name: Release

on:
  push:
    branches:
      - dev
      - main

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # This workflow expects the repository Actions setting to allow
  # "Read and write permissions" so GITHUB_TOKEN can open release PRs and push tags.
  packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build publishable packages
        run: bun run build:packages

      - name: Test publishable packages
        run: bun run test:packages

      - name: Verify publish tarballs
        run: bun run release:pack

  dev_release_pr:
    needs:
      - packages
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create or update dev release pull request
        uses: changesets/action@v1
        with:
          version: bun run changeset:version && bun install
          title: Release packages
          commit: Release packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  main_publish:
    needs:
      - packages
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify npm registry and authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          registry="$(npm config get registry)"
          echo "npm registry: $registry"

          if [ "$registry" != "https://registry.npmjs.org/" ]; then
            echo "Expected npm registry to be https://registry.npmjs.org/ but got: $registry"
            exit 1
          fi

          npm ping
          npm whoami

      - name: Capture current release tags
        run: git tag --list '@better-translate/*@*' | sort > "$RUNNER_TEMP/release-tags-before.txt"

      - name: Publish packages from main
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release:publish

      - name: Push newly created release tags
        env:
          GIT_REMOTE: origin
        run: node ./scripts/push-release-tags.mjs --before-file "$RUNNER_TEMP/release-tags-before.txt"
