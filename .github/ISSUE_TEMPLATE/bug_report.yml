name: Bug report
description: Report a reproducible bug in Better Translate
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: dropdown
    id: affected_packages
    attributes:
      label: Affected package
      description: Select the main package or area impacted by this issue.
      multiple: true
      options:
        - "@better-translate/core"
        - "@better-translate/react"
        - "@better-translate/nextjs"
        - "@better-translate/astro"
        - "@better-translate/tanstack-router"
        - "@better-translate/md"
        - "@better-translate/cli"
        - "apps/landing"
        - "examples"
        - "docs"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: Tell us what broke and why you believe it is a bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest set of steps needed to reproduce the issue.
      placeholder: |
        1. Install dependencies with ...
        2. Run ...
        3. Visit ...
        4. Observe ...
      render: shell
    validations:
      required: true
  - type: input
    id: reproduction_link
    attributes:
      label: Reproduction link
      description: Optional link to a minimal repository or sandbox.
      placeholder: https://github.com/...
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what happened instead.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share relevant versions and runtime details.
      placeholder: |
        - OS:
        - Bun:
        - Node.js:
        - Package version(s):
        - Framework:
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I understand that security vulnerabilities must be reported privately through the Security policy.
          required: true
